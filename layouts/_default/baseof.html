<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Params.name }}</title>
  <meta name="description" content="{{ .Site.Params.description | default .Site.Params.role }}">

  <!-- Open Graph / LinkedIn / Facebook -->
  <meta property="og:type"        content="profile">
  <meta property="og:url"         content="{{ .Site.BaseURL }}">
  <meta property="og:title"       content="{{ .Site.Params.name }} — {{ .Site.Params.role }}">
  <meta property="og:description" content="{{ .Site.Params.description | default .Site.Params.bio }}">
  {{ with .Site.Params.ogImage }}
  <meta property="og:image"       content="{{ . | absURL }}">
  {{ end }}

  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{ .Site.Params.name }} — {{ .Site.Params.role }}">
  <meta name="twitter:description" content="{{ .Site.Params.description | default .Site.Params.bio }}">
  {{ with .Site.Params.ogImage }}
  <meta name="twitter:image"       content="{{ . | absURL }}">
  {{ end }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  {{ block "main" . }}{{ end }}
  <script src="{{ "js/script.js" | relURL }}"></script>
</body>
</html>
